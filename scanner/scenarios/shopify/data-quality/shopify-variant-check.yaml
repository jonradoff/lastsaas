name: "shopify-variant-check"
description: "Checks that Shopify products expose variant or option data so agents can assist with size/color selection"
category: data-quality
requires_capabilities:
  - search

setup:
  - action: search
    params: { query: "shoe bag", limit: 5, context: "browsing" }
    save_as: search_results

steps:
  - assertion: array_non_empty
    source: search_results.products
    severity: high
    score_weight: 5
    message: "Search returned no products — cannot check variant data"

  - assertion: each_item_has_field
    source: search_results.products
    field: product_id
    condition: non_null
    severity: high
    score_weight: 8
    message: "Products missing 'product_id' — agents cannot fetch product details for variant selection"

  - assertion: field_present
    source: search_results.products.0.variants.0
    field: variant_id
    severity: medium
    score_weight: 5
    message: "First variant missing 'variant_id' — agents may not be able to add simple products to cart directly"

  - assertion: field_present
    source: search_results.products.0.variants.0
    field: price
    severity: medium
    score_weight: 5
    message: "First variant missing 'price' field"

  - assertion: field_present
    source: search_results.products.0.variants.0
    field: available
    severity: low
    score_weight: 3
    message: "First variant missing 'available' field — agents cannot check stock"

teardown: []
