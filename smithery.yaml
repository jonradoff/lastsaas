# Smithery configuration for MCPLens MCP server
# https://smithery.ai/docs/build

runtime: go
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      mcplensUrl:
        type: string
        description: "Base URL of your MCPLens instance (e.g., https://your-app.fly.dev)"
      apiKey:
        type: string
        description: "Root-tenant API key with admin authority"
    required:
      - mcplensUrl
      - apiKey
  commandFunction: |
    (config) => ({
      command: "./mcplens",
      args: ["mcp"],
      env: {
        MCPLENS_URL: config.mcplensUrl,
        MCPLENS_API_KEY: config.apiKey
      }
    })
